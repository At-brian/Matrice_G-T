*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F8F5F1;color:#333}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#C8B39F;border-radius:3px}
button{font-family:inherit}
textarea{font-family:inherit;resize:vertical}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:600px}}
.fade-in{animation:fadeIn .3s ease-out}
.cell-hover:hover{transform:scale(1.12);z-index:2}
.cell-hover{transition:transform .15s ease}
.btn-pill{padding:6px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;border:2px solid}
.btn-pill:hover{filter:brightness(1.1)}
.nav-btn{padding:8px 20px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s}
.nav-btn:hover{filter:brightness(1.15)}
.card{background:#fff;border-radius:12px;padding:20px 24px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-flagged{background:#FFFBEB;border:2px solid #F59E0B}
.add-form{animation:slideDown .3s ease-out;overflow:hidden}
.add-form textarea{width:100%;padding:10px 12px;border:2px solid #E5E0DA;border-radius:8px;font-size:13px;min-height:80px;transition:border-color .2s}
.add-form textarea:focus{outline:none;border-color:#82072A}
.add-form input{width:100%;padding:8px 12px;border:2px solid #E5E0DA;border-radius:8px;font-size:13px;transition:border-color .2s}
.add-form input:focus{outline:none;border-color:#82072A}
.toast{position:fixed;bottom:24px;right:24px;background:#059669;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:fadeIn .3s ease-out;z-index:999}
.export-btn{background:#511227;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.export-btn:hover{background:#82072A}
@media(max-width:768px){
  .grid-2{grid-template-columns:1fr!important}
  .pills-wrap{gap:4px!important}
  .pills-wrap .btn-pill{padding:4px 10px;font-size:11px}
}
</style>

    showToast(`✓ Réponse ajoutée pour ${em} → ${ci}`);
  };

  const deleteResponse = (em, ci, idx) => {
    const key = `${em}→${ci}`;
    setData(prev => {
      const np = { ...prev, pairs: { ...prev.pairs } };
      np.pairs[key] = np.pairs[key].filter((_, i) => i !== idx);
      if (np.pairs[key].length === 0) delete np.pairs[key];
      return np;
    });
    showToast("Réponse supprimée");
  };

  const exportJSON = () => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "matrice_give_take_export.json"; a.click();
    URL.revokeObjectURL(url);
    showToast("Export JSON téléchargé");
  };

  return (
    <div style={{minHeight:"100vh"}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#511227 0%,#82072A 100%)",padding:"20px 32px",position:"relative"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,height:4,background:"#FF2822"}} />
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
          <div>
            <div style={{fontSize:11,letterSpacing:6,color:"#C8B39F",fontWeight:600}}>MATRICE GIVE & TAKE</div>
            <div style={{fontSize:24,fontWeight:700,color:"#fff"}}>Train GESCOM PDV</div>
            <div style={{fontSize:12,color:"#C8B39F",marginTop:2}}>
              {Object.values(data.pairs).reduce((a,b)=>a+b.length,0)} réponses • 6 rôles émetteurs • 11 rôles cibles
              {addedCount > 0 && <span style={{color:"#10B981",fontWeight:600}}> • +{addedCount} ajoutée{addedCount>1?"s":""} en live</span>}
            </div>
          </div>
          <button onClick={exportJSON} className="export-btn">⬇ Exporter JSON</button>
        </div>
      </div>

      {/* Nav */}
      <div style={{display:"flex",gap:8,padding:"12px 32px",borderBottom:"1px solid #E5E0DA",background:"#fff",flexWrap:"wrap"}}>
        {[["matrix","🔲 Matrice"],["detail","🔍 Exploration"],["friction","⚡ Frictions"]].map(([k,l])=>(
          <button key={k} onClick={()=>setView(k)} className="nav-btn" style={{
            background:view===k?"#82072A":"transparent",color:view===k?"#fff":"#666"
          }}>{l}</button>
        ))}
      </div>

      <div style={{padding:"24px 32px",maxWidth:1200,margin:"0 auto"}}>
        {view === "matrix" && <MatrixView data={data} getCoverage={getCoverage}
          onSelect={(em,ci)=>{setShowEm(em);setShowCi(ci);setView("detail");}} />}
        {view === "detail" && <DetailView data={data} showEm={showEm} showCi={showCi}
          setShowEm={setShowEm} setShowCi={setShowCi} getCoverage={getCoverage}
          onAdd={addResponse} onDelete={deleteResponse} />}
        {view === "friction" && <FrictionView frictions={data.meta.frictions} />}
      </div>

      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

function MatrixView({data, getCoverage, onSelect}) {
  return (
    <div className="fade-in">
      <h2 style={{fontSize:22,color:"#511227",margin:"0 0 4px",fontWeight:700}}>Matrice de couverture</h2>
      <p style={{color:"#888",fontSize:13,margin:"0 0 20px"}}>Cliquez sur une case pour explorer les réponses</p>
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"separate",borderSpacing:3,width:"100%",minWidth:780}}>
          <thead>
            <tr>
              <th style={{padding:"8px 10px",textAlign:"left",fontSize:11,color:"#999",fontWeight:600,minWidth:120}}>ÉMETTEUR ↓ CIBLE →</th>
              {CIBLES.map(c=>(
                <th key={c} style={{padding:"6px 4px",textAlign:"center",fontSize:10,fontWeight:700,color:"#511227",background:"#F2EBE2",borderRadius:6}}>
                  {SHORT[c]||c}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {EMETTEURS.map(em=>(
              <tr key={em}>
                <td style={{padding:"8px 10px",fontWeight:600,fontSize:12,color:ROLE_COLORS[em],whiteSpace:"nowrap"}}>
                  <span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:ROLE_COLORS[em],marginRight:6,verticalAlign:"middle"}} />
                  {em}
                </td>
                {CIBLES.map(ci=>{
                  const v = getCoverage(em,ci);
                  const bg = v===0?"#FEE2E2":v>=3?"#D1FAE5":"#FEF9C3";
                  const tc = v===0?"#DC2626":v>=3?"#059669":"#B45309";
                  return (
                    <td key={ci} style={{textAlign:"center",padding:2}}>
                      <div onClick={()=>onSelect(em,ci)} className="cell-hover" style={{
                        background:bg,borderRadius:8,padding:"8px 4px",fontSize:14,fontWeight:700,color:tc,
                        cursor:"pointer",minWidth:38,position:"relative"
                      }}>
                        {v===0?"—":v}
                      </div>
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div style={{display:"flex",gap:20,marginTop:16,fontSize:12,color:"#888",flexWrap:"wrap"}}>
        <span><span style={{display:"inline-block",width:14,height:14,borderRadius:4,background:"#D1FAE5",verticalAlign:"middle",marginRight:6}}/>3+ réponses</span>
        <span><span style={{display:"inline-block",width:14,height:14,borderRadius:4,background:"#FEF9C3",verticalAlign:"middle",marginRight:6}}/>1-2 réponses</span>
        <span><span style={{display:"inline-block",width:14,height:14,borderRadius:4,background:"#FEE2E2",verticalAlign:"middle",marginRight:6}}/>Aucune — à compléter</span>
      </div>
    </div>
  );
}

function DetailView({data, showEm, showCi, setShowEm, setShowCi, getCoverage, onAdd, onDelete}) {
  const [showForm, setShowForm] = useState(false);
  const [formTake, setFormTake] = useState("");
  const [formGive, setFormGive] = useState("");
  const [formEquipe, setFormEquipe] = useState("");
  const formRef = useRef(null);

  const currentKey = `${showEm}→${showCi}`;
  const currentData = data.pairs[currentKey] || [];
  const count = getCoverage(showEm, showCi);

  const handleSubmit = () => {
    if (!formTake.trim() && !formGive.trim()) return;
    onAdd(showEm, showCi, {
      take: formTake.trim(),
      give: formGive.trim(),
      equipe: formEquipe.trim() || undefined
    });
    setFormTake(""); setFormGive(""); setFormEquipe(""); setShowForm(false);
  };

  const handleCancel = () => {
    setFormTake(""); setFormGive(""); setFormEquipe(""); setShowForm(false);
  };

  useEffect(() => {
    if (showForm && formRef.current) {
      formRef.current.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }
  }, [showForm]);

  return (
    <div className="fade-in">
      <h2 style={{fontSize:22,color:"#511227",margin:"0 0 16px",fontWeight:700}}>Exploration des réponses</h2>

      {/* Emitter selector */}
      <div style={{marginBottom:14}}>
        <label style={{fontSize:11,fontWeight:600,color:"#999",display:"block",marginBottom:6}}>RÔLE ÉMETTEUR</label>
        <div className="pills-wrap" style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {EMETTEURS.map(em=>(
            <button key={em} onClick={()=>{setShowEm(em);setShowForm(false);}} className="btn-pill" style={{
              borderColor:ROLE_COLORS[em],
              background:showEm===em?ROLE_COLORS[em]:"transparent",
              color:showEm===em?"#fff":ROLE_COLORS[em]
            }}>{em}</button>
          ))}
        </div>
      </div>

      {/* Target selector */}
      <div style={{marginBottom:20}}>
        <label style={{fontSize:11,fontWeight:600,color:"#999",display:"block",marginBottom:6}}>RÔLE CIBLE</label>
        <div className="pills-wrap" style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {CIBLES.map(ci=>{
            const cv = getCoverage(showEm,ci);
            return (
              <button key={ci} onClick={()=>{setShowCi(ci);setShowForm(false);}} className="btn-pill" style={{
                borderColor:showCi===ci?"#82072A":"#ddd",
                background:showCi===ci?"#82072A":"transparent",
                color:showCi===ci?"#fff":cv===0?"#bbb":"#666"
              }}>{SHORT[ci]||ci}{cv>0&&<span style={{marginLeft:4,fontSize:10,opacity:.6}}>({cv})</span>}</button>
            );
          })}
        </div>
      </div>

      {/* Pair header */}
      <div className="card" style={{marginBottom:16,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
        <span style={{background:ROLE_COLORS[showEm],color:"#fff",padding:"4px 14px",borderRadius:14,fontSize:13,fontWeight:700}}>{showEm}</span>
        <span style={{fontSize:22,color:"#C8B39F"}}>→</span>
        <span style={{background:"#511227",color:"#fff",padding:"4px 14px",borderRadius:14,fontSize:13,fontWeight:700}}>{showCi}</span>
        <span style={{marginLeft:"auto",fontSize:13,color:count===0?"#DC2626":"#059669",fontWeight:600}}>
          {count===0?"⚠ Aucune réponse":`${count} réponse${count>1?"s":""}`}
        </span>
        <button onClick={()=>setShowForm(!showForm)} style={{
          background:showForm?"#DC2626":"#10B981",color:"#fff",border:"none",padding:"8px 16px",
          borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",transition:"all .2s"
        }}>
          {showForm ? "✕ Annuler" : "+ Ajouter une réponse"}
        </button>
      </div>

      {/* Add form */}
      {showForm && (
        <div ref={formRef} className="card add-form" style={{marginBottom:16,border:"2px solid #10B981"}}>
          <div style={{fontSize:14,fontWeight:700,color:"#059669",marginBottom:12}}>
            ✎ Nouvelle réponse : {showEm} → {showCi}
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:11,fontWeight:600,color:"#666",display:"block",marginBottom:4}}>Squad / Équipe (optionnel)</label>
            <input value={formEquipe} onChange={e=>setFormEquipe(e.target.value)} placeholder="Ex: Suite Mobilys, PRETIUM..." />
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}} className="grid-2">
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#82072A",display:"block",marginBottom:4,letterSpacing:1}}>
                TAKE — Ce que j'attends de {showCi}
              </label>
              <textarea value={formTake} onChange={e=>setFormTake(e.target.value)}
                placeholder="Décrivez vos attentes envers ce rôle..." />
            </div>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:"#059669",display:"block",marginBottom:4,letterSpacing:1}}>
                GIVE — Ce que j'apporte à {showCi}
              </label>
              <textarea value={formGive} onChange={e=>setFormGive(e.target.value)}
                placeholder="Décrivez ce que vous apportez à ce rôle..." />
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}>
            <button onClick={handleCancel} style={{
              background:"#f5f5f5",border:"1px solid #ddd",padding:"8px 20px",borderRadius:8,
              fontSize:13,cursor:"pointer",color:"#666"
            }}>Annuler</button>
            <button onClick={handleSubmit} disabled={!formTake.trim()&&!formGive.trim()} style={{
              background:(!formTake.trim()&&!formGive.trim())?"#ccc":"#10B981",color:"#fff",border:"none",
              padding:"8px 24px",borderRadius:8,fontSize:13,fontWeight:600,cursor:(!formTake.trim()&&!formGive.trim())?"default":"pointer"
            }}>✓ Ajouter cette réponse</button>
          </div>
        </div>
      )}

      {/* Responses */}
      {currentData.length > 0 ? (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          {currentData.map((entry, i) => (
            <div key={i} className={`card fade-in ${entry.flagged?"card-flagged":""}`}
              style={entry.addedLive?{border:"2px solid #10B981"}:{}}>

              {entry.flagged && (
                <div style={{background:"#FEF3C7",borderRadius:6,padding:"6px 12px",marginBottom:12,fontSize:11,color:"#92400E",fontWeight:600}}>
                  ⚠ Réponse signalée : contenu identique copié sur tous les rôles cibles (System Team)
                </div>
              )}

              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {entry.equipe && (
                    <span style={{fontSize:11,color:"#999",fontWeight:600,background:"#f5f5f5",padding:"2px 8px",borderRadius:4}}>
                      {entry.equipe}
                    </span>
                  )}
                  {entry.addedLive && (
                    <span style={{fontSize:10,color:"#059669",fontWeight:700,background:"#D1FAE5",padding:"2px 8px",borderRadius:4}}>
                      AJOUTÉ EN ATELIER
                    </span>
                  )}
                </div>
                {entry.addedLive && (
                  <button onClick={()=>onDelete(showEm,showCi,i)} title="Supprimer" style={{
                    background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#DC2626",opacity:.5,transition:"opacity .2s"
                  }} onMouseEnter={e=>e.target.style.opacity=1} onMouseLeave={e=>e.target.style.opacity=.5}>✕</button>
                )}
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}} className="grid-2">
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#82072A",marginBottom:6,letterSpacing:1}}>TAKE — Ce que j'attends</div>
                  <div style={{fontSize:13,color:"#333",whiteSpace:"pre-line",lineHeight:1.6}}>
                    {entry.take || <span style={{color:"#ccc",fontStyle:"italic"}}>Non renseigné</span>}
                  </div>
                </div>
                <div>
                  <div style={{fontSize:11,fontWeight:700,color:"#059669",marginBottom:6,letterSpacing:1}}>GIVE — Ce que j'apporte</div>
                  <div style={{fontSize:13,color:"#333",whiteSpace:"pre-line",lineHeight:1.6}}>
                    {entry.give || <span style={{color:"#ccc",fontStyle:"italic"}}>Non renseigné</span>}
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      ) : (
        <div style={{background:"#FEE2E2",borderRadius:12,padding:"40px 24px",textAlign:"center"}}>
          <div style={{fontSize:40,marginBottom:8}}>🔲</div>
          <div style={{fontSize:16,color:"#991B1B",fontWeight:600}}>Aucune réponse pour cette paire</div>
          <div style={{fontSize:13,color:"#B91C1C",marginTop:4}}>Utilisez le bouton "+ Ajouter une réponse" pour compléter en atelier</div>
        </div>
      )}
    </div>
  );
}

function FrictionView({frictions}) {
  return (
    <div className="fade-in">
      <h2 style={{fontSize:22,color:"#511227",margin:"0 0 4px",fontWeight:700}}>Points de friction identifiés</h2>
      <p style={{color:"#888",fontSize:13,margin:"0 0 20px"}}>Les difficultés principales remontées par les répondants</p>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        {frictions.map((f,i)=>(
          <div key={i} className="card" style={{borderLeft:`4px solid ${ROLE_COLORS[f.from]||"#999"}`,padding:"14px 20px"}}>
            <span style={{background:ROLE_COLORS[f.from],color:"#fff",padding:"2px 10px",borderRadius:10,fontSize:11,fontWeight:700,marginRight:10}}>{f.from}</span>
            <span style={{fontSize:14,color:"#333",lineHeight:1.6}}>{f.text}</span>
          </div>
        ))}
      </div>
      <div style={{background:"#511227",borderRadius:12,padding:"20px 24px",marginTop:24}}>
        <div style={{fontSize:15,color:"#fff",fontWeight:700,marginBottom:8}}>Thème dominant</div>
        <div style={{fontSize:14,color:"#C8B39F",lineHeight:1.6}}>
          Le manque de clarté des User Stories et l'instabilité du périmètre reviennent dans la majorité des réponses.
          La mise en place d'une Definition of Ready stricte apparaît comme le levier d'amélioration le plus attendu.
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
